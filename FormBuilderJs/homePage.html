<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Builder - Home</title>
    <link id="themeStylesheet"
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootswatch@4.6.2/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="app/css/home.css">
</head>
<body>

<div class="home-container">
    <div class="home-header">
        <h1>Form Builder</h1>
        <p>Build and manage forms</p>
    </div>
    
    <div class="menu-options">
    <a href="app/html/index.html" class="menu-card create">
        <div class="card-content">
            <span class="card-icon"><i class="bi bi-file-earmark-plus"></i></span>
            <div class="card-title">Create New Form</div>
            <div class="card-description">
                Start building a new form from scratch
            </div>
        </div>
    </a>

    <a href="app/html/existingForms.html" class="menu-card open">
        <div class="card-content">
            <span class="card-icon"><i class="bi bi-folder2-open"></i></span>
            <div class="card-title">Open Existing Forms</div>
            <div class="card-description">
                Browse and edit your saved forms
            </div>
        </div>
    </a>

    <a href="app/html/addResource.html" class="menu-card resources">
        <div class="card-content">
            <span class="card-icon"><i class="bi bi-plus-circle"></i></span>
            <div class="card-title">Add New Resource</div>
            <div class="card-description">
                Add resources, sections and components for your forms
            </div>
        </div>
    </a>

    <a href="app/html/reports.html" class="menu-card reports">
        <div class="card-content">
            <span class="card-icon"><i class="bi bi-bar-chart"></i></span>
            <div class="card-title">Reports</div>
            <div class="card-description">
                View and export form submissions
            </div>
        </div>
    </a>
</div>
</div>



</body>
</html>
