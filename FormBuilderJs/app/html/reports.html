<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reports</title>
    <link id="themeStylesheet"
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootswatch@4.6.2/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet" href="../../dist/formio.full.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/existingForms.css">
    <link rel="stylesheet" href="../css/builder.css">

    <style>
        #submissionsTable tbody tr {
            cursor: pointer;
            user-select: none;
        }

        #submissionsTable tbody tr:hover {
            background-color: #e9ecef !important;
        }
    </style>

</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="builder-navbar">
    <div class="header-left">
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()" data-toggle="tooltip" data-placement="bottom" title="Menu">
            <i class="bi bi-list"></i>
        </button>
        <h2>Reports</h2>
    </div>

    <div class="menu-buttons"></div>

</div>

<div id="reportsContent" class="forms-list-container">
    <div class="forms-wrapper">
        <div id="reportsLoadingMessage" class="alert alert-info">
            <i class="bi bi-info-circle"></i> <strong>Loading forms...</strong>
        </div>
        
        <!-- Search and Filter Controls -->
        <div class="table-controls" id="tableControls" style="display: none;">
            <div class="controls-left">
                <input type="text" id="searchInput" class="search-box" placeholder="Search forms..." />
                <select id="filterSelect" class="filter-dropdown">
                    <option value="">Sort by:</option>
                    <option value="name-asc">A - Z</option>
                    <option value="name-desc">Z - A</option>
                    <option value="date-desc">New - Old</option>
                    <option value="date-asc">Old - New</option>
                </select>
            </div>
        </div>
        
        <table id="reportsTable" class="table table-striped table-hover" style="display: none;">
            <thead class="table-dark">
                <tr>
                    <th>Form Name</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="reportsTableBody">
            </tbody>
        </table>
        
        <!-- Pagination Controls -->
        <div class="pagination-controls" id="paginationControls" style="display: none;">
            <div class="pagination-buttons">
                <button class="pagination-btn" id="prevPageBtn" onclick="FormBuilderApi.previousPage()">&lt; Previous</button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="pagination-btn" id="nextPageBtn" onclick="FormBuilderApi.nextPage()" style="display: none;">More &gt;</button>
            </div>
            <div class="pagination-info">
                <span id="paginationInfo">Page 1</span>
            </div>
        </div>
    </div>
</div>

<!-- Report Dialog Modal -->
<div class="modal fade" id="reportModal" tabindex="-1" role="dialog" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reportModalLabel">Form Name</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div id="reportLoadingMessage" class="alert alert-info" style="display: none;">
                    <i class="bi bi-hourglass-split"></i> <strong>Loading submissions...</strong>
                </div>
                <div id="reportErrorMessage" class="alert alert-danger" style="display: none;"></div>
                <table id="submissionsTable" class="table table-striped table-hover" style="display: none;">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 50px;">
                                <input type="checkbox" id="selectAllCheckbox" title="Select all submissions">
                            </th>
                            <th>Submission ID</th>
                            <th>Submission Date</th>
                        </tr>
                    </thead>
                    <tbody id="submissionsTableBody">
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="exportJsonBtn">
                    <i class="bi bi-download"></i> Export to Json
                </button>
                <button type="button" class="btn btn-primary" id="exportCsvBtn">
                    <i class="bi bi-download"></i> Export CSV
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../dist/formio.full.js"></script>
<script src="../js/CommonItems.js"></script>
<script src="../js/main.js"></script>
<script src="../js/FormBuilderApi.js"></script>
<script src="../js/reports.js"></script>

</body>
</html>
