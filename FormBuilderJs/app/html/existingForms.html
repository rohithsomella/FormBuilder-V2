<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Open Existing Forms</title>
	<!-- <link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"> -->
<link id="themeStylesheet"
rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootswatch@4.6.2/dist/flatly/bootstrap.min.css">
	<link rel="stylesheet" href="../../dist/formio.full.css">

    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/existingForms.css">
    <link rel="stylesheet" href="../css/builder.css">

</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="builder-navbar">
    <div class="header-left">
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <i class="bi bi-list"></i>
        </button>
        <h2>Open Existing Forms</h2>
    </div>
    
    <div class="dropdown-menu-custom" id="dropdownMenu">
        <div class="dropdown-menu-header">
            <h3>Menu</h3>
            <button class="menu-close-btn" onclick="toggleMenu()">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="dropdown-menu-items">
            <a href="../../homePage.html">
                <i class="bi bi-house"></i> Home
            </a>
            <a href="index.html">
                <i class="bi bi-file-earmark"></i> Create Form
            </a>
            <a href="addResource.html">
                <i class="bi bi-plus-circle"></i> Add new Resource
            </a>
        </div>
    </div>

<div class="menu-buttons">

   
    

</div>

</div>


<div id="formsList" class="forms-list-container">
    <div class="forms-wrapper">
        <div id="formsLoadingMessage" class="alert alert-info">
            <i class="bi bi-info-circle"></i> <strong>Loading forms...</strong>
        </div>
        
        <!-- Search and Filter Controls -->
        <div class="table-controls" id="tableControls" style="display: none;">
            <div class="controls-left">
                <input type="text" id="searchInput" class="search-box" placeholder="Search forms..." />
                <select id="filterSelect" class="filter-dropdown">
                    <option value="">Sort by:</option>
                    <option value="name-asc">A - Z</option>
                    <option value="name-desc">Z - A</option>
                    <option value="date-desc">New - Old</option>
                    <option value="date-asc">Old - New</option>
                </select>
            </div>
        </div>
        
        <table id="formsTable" class="table table-striped table-hover" style="display: none;">
            <thead class="table-dark">
            <tr>
                <th>Form Name</th>
                <th>Form Title</th>
                <th>Form Tags</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="formsTableBody">
        </tbody>
    </table>
    
        <!-- Pagination Controls -->
        <div class="pagination-controls" id="paginationControls" style="display: none;">
            <div class="pagination-buttons">
                <button class="pagination-btn" id="prevPageBtn" onclick="FormBuilderApi.previousPage()">&lt; Previous</button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="pagination-btn" id="nextPageBtn" onclick="FormBuilderApi.nextPage()" style="display: none;">More &gt;</button>
            </div>
            <div class="pagination-info">
                <span id="paginationInfo">Page 1</span>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../../dist/formio.full.js"></script>
<script src="../js/main.js"></script>
<script src="../js/FormBuilderApi.js"></script>

</body></html>
