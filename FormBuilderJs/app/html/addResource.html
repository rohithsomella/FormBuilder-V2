<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add new Resource</title>
    <link id="themeStylesheet"
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootswatch@4.6.2/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet" href="../../dist/formio.full.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../css/builder.css">
    <link rel="stylesheet" href="../css/addResource.css">

</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="builder-navbar">
    <div class="header-left">
        <button class="menu-btn" id="menuBtn" onclick="toggleMenu()" data-toggle="tooltip" data-placement="bottom" title="Menu">
            <i class="bi bi-list"></i>
        </button>
        <h2>Add New Resource</h2>
        <button class="info-btn" id="structureInfoBtn" data-toggle="popover" data-trigger="hover" data-placement="bottom" data-html="true" title="Resource Types">
            <i class="bi bi-info-circle"></i>
        </button>
    </div>

    <div class="menu-buttons"></div>
</div>

<div id="resourceContent">
    <div class="resource-lists-container">
        <div class="resource-list-card">
            <div class="resource-list-header">
                <h3><i class="bi bi-database"></i> Add New Resource</h3>
                <button class="btn btn-primary add-btn" data-type="resource" title="Add Resource">
                    <i class="bi bi-plus-lg"></i> Add
                </button>
            </div>
            <div class="resource-list-body" id="resourceList">
                <div class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <p>No resources added yet</p>
                </div>
            </div>
        </div>

        <div class="resource-list-card">
            <div class="resource-list-header">
                <h3><i class="bi bi-puzzle"></i> Add New Component</h3>
                <button class="btn btn-primary add-btn" data-type="component" title="Add Component">
                    <i class="bi bi-plus-lg"></i> Add
                </button>
            </div>
            <div class="resource-list-body" id="componentList">
                <div class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <p>No components added yet</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addResourceModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Resource</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="addResourceForm">
                    <div class="form-group" id="resourceTypeField">
                        <label id="resourceTypeLabel">Resource Type <span class="required">*</span></label>
                        <input type="text" class="form-control" id="resResourceTypeText" placeholder="Enter resource type" style="display:none;">
                        <select class="form-control" id="resResourceTypeDropdown" style="display:none;">
                            <option value="">-- Select Resource Type --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Component Name <span class="required">*</span></label>
                        <input type="text" class="form-control" id="resComponentName">
                    </div>
                    <div class="form-group">
                        <label>Description <span class="optional">(optional)</span></label>
                        <input type="text" class="form-control" id="resDescription">
                    </div>
                    <div class="form-group">
                        <label>JSON <span class="required">*</span></label>
                        <textarea class="form-control" id="resJson" rows="5"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="submitResourceBtn">Submit</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../dist/formio.full.js"></script>
<script src="../js/CommonItems.js"></script>
<script src="../js/main.js"></script>
<script src="../js/FormBuilderApi.js"></script>
<script src="../js/addResource.js"></script>

</body>
</html>
