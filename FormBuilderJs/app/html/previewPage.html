<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Form Preview</title>
    <link id="themeStylesheet" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@4.6.2/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet" href="../../dist/formio.full.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/Formio_Template.css">
    <link rel="stylesheet" href="../styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: white;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .preview-container {
            max-width: 1600px;
            width: 90%;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }
        .preview-header h2 {
            margin: 0;
            color: #333;
        }
        #previewFormContent {
            min-height: 400px;
        }
        .error-message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="preview-container">
    <div class="preview-header">
        <h2>Form Preview</h2>
    </div>
    <div id="previewFormContent">
        <div class="loading">
            <i class="bi bi-hourglass-split"></i> Loading form...
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../dist/formio.full.js"></script>
<script src="../js/FormBuilderApi.js"></script>
<script src="../js/formSubmissionHandler.js"></script>

<script>
    // Get form schema from sessionStorage
    const previewFormSchema = sessionStorage.getItem('previewFormSchema');
    const formContainer = document.getElementById('previewFormContent');

    if (!previewFormSchema) {
        formContainer.innerHTML = '<div class="error-message"><i class="bi bi-exclamation-circle"></i> <strong>Error:</strong> No form schema found. Please open the form preview from the builder.</div>';
    } else {
        try {
            const formSchema = JSON.parse(previewFormSchema);
            console.log('📄 Loading form schema in preview page:', formSchema);

            // Load form using Formio
            Formio.createForm(formContainer, formSchema)
                .then(function(form) {
                    console.log('✓ Form preview loaded successfully in page');
                    console.log('Form instance:', form);
                    console.log('FormBuilderApi available?', typeof FormBuilderApi !== 'undefined');

                    // Handle form submission
                    form.on('submitForm', function(submission) {
                        console.log('🔔 SUBMITFORM EVENT FIRED!', submission);
                        handleFormSubmission(submission, form, formContainer);
                    });

                    // Also try alternative events
                    form.on('submit', function(submission) {
                        console.log('🔔 SUBMIT EVENT FIRED!', submission);
                        handleFormSubmission(submission, form, formContainer);
                    });

                    // Also listen for form errors
                    form.on('error', function(error) {
                        console.error('Form error:', error);
                    });
                })
                .catch(function(error) {
                    console.error('Error loading form preview:', error);
                    formContainer.innerHTML = '<div class="error-message"><i class="bi bi-exclamation-circle"></i> <strong>Error loading form:</strong> ' + error.message + '</div>';
                });
        } catch (error) {
            console.error('Error parsing form schema:', error);
            formContainer.innerHTML = '<div class="error-message"><i class="bi bi-exclamation-circle"></i> <strong>Error:</strong> Invalid form schema. ' + error.message + '</div>';
        }
    }
</script>

</body>
</html>
