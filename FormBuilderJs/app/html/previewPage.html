    <div class="form-container">

            <h1 id="formTitle">Loading Form...</h1>
            <p id="formDescription" style="display: none;"></p>
        </div>
        <div id="errorContainer"></div>
        <div id="successContainer"></div>
        <div id="loadingMessage" class="loading-message">
            <i class="bi bi-hourglass-split"></i> <strong>Loading form...</strong>
        </div>
        <div id="formio-form" style="display: none;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get formId from URL query parameter
            var urlParams = new URLSearchParams(window.location.search);
            var formId = urlParams.get('formId');

            if (!formId) {
                showError('No form ID provided in URL');
                return;
            }

            console.log('Loading form with ID:', formId);

            // Fetch the form
            FormBuilderApi.getFormById(formId,
                function(form) {
                    console.log('Form loaded successfully:', form);
                    loadFormForPreview(form);
                },
                function(error) {
                    console.error('Error loading form:', error);
                    showError('Failed to load form: ' + error);
                }
            );
        });

        function loadFormForPreview(form) {
            try {
                // Update page title and description
                document.getElementById('formTitle').textContent = form.formTitle || form.formName || 'Untitled Form';
                
                if (form.formTags) {
                    var description = document.getElementById('formDescription');
                    description.textContent = form.formTags;
                    description.style.display = 'block';
                }

                // Parse form JSON
                var formSchema = {};
                try {
                    formSchema = JSON.parse(form.formJson);
                } catch (e) {
                    console.error('Error parsing form JSON:', e);
                    formSchema = { components: [] };
                }

                // Hide loading and show form
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('formio-form').style.display = 'block';

                // Render the form with submission handling
                Formio.createForm(
                    document.getElementById('formio-form'),
                    formSchema
                ).then(function(formInstance) {
                    console.log('Form rendered successfully');

                    // Handle form submission - use 'submitForm' event (Formio's submit event)
                    formInstance.on('submitForm', function(submission) {
                        console.log('Form submitted with data:', submission);
                        
                        // Get just the data part of the submission
                        var submissionData = submission.data;
                        console.log('Submission data:', submissionData);

                        // Send to backend
                        FormBuilderApi.submitFormData(
                            form.formId,
                            submissionData,
                            function(response) {
                                console.log('Submission saved successfully:', response);
                                showSuccess('Form submitted successfully! Submission ID: ' + response.submissionId);
                                // Reset the form
                                formInstance.reset();
                            },
                            function(error, statusCode) {
                                console.error('Error submitting form:', error);
                                showError('Error submitting form: ' + error);
                            }
                        );

                        // Prevent default submission
                        return false;
                    });

                }).catch(function(error) {
                    console.error('Error rendering form:', error);
                    showError('Error rendering form: ' + error.message);
                });

            } catch (error) {
                console.error('Error loading form for preview:', error);
                showError('Error loading form: ' + error.message);
            }
        }

        function showError(message) {
            var errorContainer = document.getElementById('errorContainer');
